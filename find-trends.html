<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindTrends - Featlis Discord Bots</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="container">
        <header class="fade-in">
            <h1 class="typing-effect">FindTrends</h1>
            <p class="subtitle">話題のトレンドをDiscord内で素早く検索・確認できるBot</p>
        </header>

        <main>
            <div class="card bot-detail fade-in-up">
                <div class="card-icon"><i class="fa-solid fa-chart-line"></i></div>
                <h2>機能紹介</h2>
                <p>話題のトレンドやニュースをDiscord内で素早く検索・確認できるBotです。</p>
                <p>最新の話題を逃さずチェックするために、トレンド情報やニュースを定期的に取得して共有することができます。</p>
                
                <h3 style="margin-top: 20px; color: var(--accent-color); border-bottom: 1px dashed var(--border-color); padding-bottom: 5px;">主な機能</h3>
                <ul style="list-style: inside; margin-bottom: 20px; color: #444; text-align: left; padding: 10px;">
                    <li>トレンドキーワードの取得と表示</li>
                    <li>最新ニュースの検索機能</li>
                </ul>
                <div class="card-actions" style="margin-top: 30px;">
                    <a href="https://discord.com/oauth2/authorize?client_id=1518664593449156719" target="_blank" class="btn btn-invite">
                        <i class="fa-solid fa-robot"></i> 導入する
                    </a>
                    <a href="index.html" class="btn btn-back">
                        <i class="fa-solid fa-arrow-left"></i> 戻る
                    </a>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Featlis. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
